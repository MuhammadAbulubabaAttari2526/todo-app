<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>todo app</title>
</head>
<style>
body{
    /* height: 0vh; */
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #1e174b, #30258f, #6a5cff);
}
h1{
    text-align: center;
    color: white;
    font-size: 50px;
    margin-bottom: 50px;
}
.parent{
    border-radius: 20px;
    background: rgba(30, 23, 75, 0.6);   /* 🔥 better than solid color */
    padding: 40px;
    box-shadow: 0 10px 40px rgba(21, 89, 190, 0.5);
    transition: all 0.4s ease;
    backdrop-filter: blur(10px);  /* ✅ realistic blur */
    -webkit-backdrop-filter: blur(10px);
}

#taskinput{
    width: 15rem;
    padding: 3%;
    background-color: rgba(255, 255, 255, 0.685);
     border: none;
     outline: none;
}
ul button {
    background-color: transparent;
    color: white;
    border: none;
    
    /* border: 1px dotted navy; */
    
}
.child div{
    display: flex;
    align-items: center;
    justify-content: space-between;
    /* box-shadow: 0px 0px 100px 100px #1e174b; */
    border-radius: 30%;
}
ul{
    margin: 0%  auto;
    text-align: center;
}
li {
    list-style-type: none;
    border: 1px dotted gray;
    padding: 10px;
    margin-top: 10px;
   margin-left: -2.5rem;
   width:270px;
   text-align: start;
   display: flex;
   justify-content: space-between;
   align-items: center;
   color: white;
}
#searchbar{
     width: 20rem;
     padding:10px ;
     border-radius: 10px;
     margin-top: -10px;
     margin-bottom: 50px;
     background-color: rgba(255, 255, 255, 0.685);
     border: none;
     outline: none;

}
</style>

<body>  
      <h1>TUDO APP</h1>
      <input type="search" name="search" id="searchbar" placeholder="search">
   <div class="parent">

    <div class="child">
    <div>
    <input type="text" name="" id="taskinput" placeholder="add new task">
    <button id="taskbutton" style=" margin-left: 5%;  padding: 3%;  background-color: #6E62C2; border: 5%; color: white; border: 1px solid #6E62C2;">ADD</button>
    </div>
    <ul id="tasklist"></ul>
    </div>
    </div>


    <script src="./appp.js"></script>
</body>
</html>
